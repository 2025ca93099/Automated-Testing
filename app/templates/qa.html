<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSP-4-S2-S25App — Q&A</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; }
        header { background: #4a90d9; color: #fff; padding: 14px 32px;
                 display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 18px; }
        header a { color: #fff; text-decoration: none; font-size: 14px;
                   border: 1px solid #fff; padding: 4px 14px; border-radius: 4px; }
        header a:hover { background: rgba(255,255,255,.15); }
        .container { max-width: 740px; margin: 40px auto; padding: 0 16px; }
        .card { background: #fff; padding: 32px; border-radius: 8px;
                box-shadow: 0 2px 12px rgba(0,0,0,.12); }
        h2 { font-size: 18px; color: #333; margin-bottom: 20px; }
        textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 4px;
                   font-size: 14px; resize: vertical; min-height: 100px; }
        button { margin-top: 12px; padding: 10px 28px; background: #4a90d9; color: #fff;
                 border: none; border-radius: 4px; font-size: 14px; cursor: pointer; }
        button:hover { background: #357abd; }
        .answer-box { margin-top: 28px; background: #f6faff;
                      border-left: 4px solid #4a90d9; padding: 16px; border-radius: 4px; }
        .answer-box h3 { font-size: 14px; color: #4a90d9; margin-bottom: 10px;
                         text-transform: uppercase; letter-spacing: .5px; }
        .question-echo { font-size: 13px; color: #666; margin-bottom: 10px; }
        .answer-box p#answer-text { font-size: 15px; color: #333; line-height: 1.65; }
    </style>
</head>
<body>
    <header>
        <h1>NSP-4-S2-S25App &mdash; AI Q&amp;A</h1>
        <a href="/logout" id="logout-btn">Logout</a>
    </header>

    <div class="container">
        <div class="card">
            <h2>Welcome, {{ username }}! Ask anything.</h2>
            <form method="POST" action="/qa" id="qa-form">
                <textarea name="question" id="question-input"
                          placeholder="Type your question here...">{{ question }}</textarea>
                <button type="submit" id="submit-btn">Submit</button>
            </form>

            {% if answer is not none %}
            <div class="answer-box" id="answer-box">
                <h3>Answer</h3>
                {% if question %}
                <p class="question-echo"><strong>Q:</strong> {{ question }}</p>
                {% endif %}
                <p id="answer-text">{{ answer }}</p>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
